name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format 19
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format-19

      - name: Check C and C++ formatting
        run: |
          find include src tests tools -type f \
            \( -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            -print0 \
            | xargs -0 --no-run-if-empty clang-format-19 --dry-run --Werror --style=file

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes cppcheck

      - name: Analyze C and C++ sources
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --std=c++17 \
            -I include \
            src tests tools/test_rtsps_client.cpp

  build:
    name: x86_64 build and smoke test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            cmake \
            g++ \
            libgstreamer1.0-dev \
            libsqlite3-dev \
            gstreamer1.0-plugins-base \
            ninja-build \
            pkg-config

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run CLI smoke test
        run: ./build/rpi_vms --help

      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Test time offset measurement tool
        run: python3 -m unittest tools/test_measure_time_offsets.py
